    蓮ノ空女学院の102期生。文武両道、眉目秀麗。音楽一家に生
    まれ、小さいころから様々な習い事をしている才女。スクール
    アイドルクラブの部長として、夢だった『ラブライブ！優勝』
    を成し遂げた。多くの出会いを経て、あまり好きではなかった
    自分をようやく認めてあげられるようになった。
